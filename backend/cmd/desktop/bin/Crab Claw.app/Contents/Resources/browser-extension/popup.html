<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Status Bar -->
  <div class="header">
    <h1>CrabClaw</h1>
    <span class="version">v1.1</span>
    <div class="status-bar">
      <span class="status-badge off" id="statusBadge">OFF</span>
      <span class="status-counts" id="statusCounts"></span>
    </div>
  </div>

  <!-- Tabs Panel -->
  <div class="panel">
    <div class="panel-header" data-panel="tabs">
      <span class="panel-title">Tabs</span>
      <span class="panel-toggle">&#9660;</span>
    </div>
    <div class="panel-body" id="tabsPanel">
      <input type="text" class="tab-search" id="tabSearch" placeholder="Search tabs...">
      <div class="tab-list" id="tabList">
        <div class="empty">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="btn-row">
    <button class="btn btn-primary" id="attachCurrentBtn">Attach Current</button>
    <button class="btn btn-outline" id="refreshBtn">Refresh</button>
    <button class="btn btn-danger" id="disconnectBtn">Disconnect</button>
  </div>

  <!-- Log Panel -->
  <div class="panel">
    <div class="panel-header" data-panel="log">
      <span class="panel-title">Log</span>
      <span class="panel-toggle collapsed">&#9660;</span>
    </div>
    <div class="panel-body collapsed" id="logPanel">
      <div class="log-list" id="logList">
        <div class="empty">No log entries</div>
      </div>
      <div class="log-actions">
        <button class="btn btn-outline" id="clearLogBtn">Clear</button>
      </div>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="panel">
    <div class="panel-header" data-panel="settings">
      <span class="panel-title">Settings</span>
      <span class="panel-toggle collapsed">&#9660;</span>
    </div>
    <div class="panel-body collapsed" id="settingsPanel">
      <div class="settings-row">
        <label>Relay URL</label>
        <input type="text" id="relayUrl" placeholder="ws://127.0.0.1:19004/ws">
      </div>
      <div class="settings-row">
        <label>Token</label>
        <input type="text" id="relayToken" placeholder="Auto-discovered">
      </div>
      <div class="settings-row">
        <label>Auto-connect</label>
        <div class="toggle-wrapper">
          <div class="toggle on" id="autoConnectToggle"></div>
        </div>
      </div>
      <div class="settings-row" style="margin-top:8px">
        <button class="btn btn-primary" id="saveSettingsBtn">Save & Reconnect</button>
      </div>
    </div>
  </div>

  <div class="footer">CrabClaw Browser Control &middot; Content Scripts + CDP</div>

  <script src="popup.js"></script>
</body>
</html>
